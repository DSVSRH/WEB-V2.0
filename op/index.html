<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Manager - DSVSR Hospital</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Header */
        .header {
            background: #0056b3;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
        }

        .hospital-info h1 {
            font-size: 24px;
        }

        .hospital-info p {
            font-size: 14px;
        }

        /* Main Layout */
        .container {
            display: flex;
            height: calc(100vh - 90px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .menu-item:hover {
            background: #eaf3ff;
        }

        /* Content */
        .content {
            flex: 1;
            background: white;
            padding: 10px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <img src="logo.png" class="logo">

        <div class="hospital-info">
            <h1>Dr. S. Venkata Subba Reddy Hospital</h1>
            <p>Multispeciality Hospital - Document Manager</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">

            <div class="menu-item"
                onclick="openPage('deliverycertificate/index.html')">
                Delivery Certificate
            </div>

            <div class="menu-item"
                onclick="openPage('birthcertificate/index.html')">
                Birth Certificate
            </div>

            <div class="menu-item"
                onclick="openPage('deathcertificate/index.html')">
                Death Certificate
            </div>

            <div class="menu-item"
                onclick="openPage('medicalcertificate/index.html')">
                Medical Certificate
            </div>

            <div class="menu-item"
                onclick="openPage('opd/index.html')">
                OPD Registration
            </div>

            <!-- Add remaining forms here -->

        </div>

        <!-- Content Area -->
        <div class="content">
            <!-- Default page -->
            <iframe id="pageFrame"
                src="deliverycertificate/index.html">
            </iframe>
        </div>

    </div>

    <script>
        function openPage(page) {
            document.getElementById("pageFrame").src = page;
        }
    </script>

</body>
</html>
